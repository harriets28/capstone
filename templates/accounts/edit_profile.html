{% extends 'base.html' %}

{% block title %}Edit Profile — Wanderlust{% endblock %}

{% block content %}

<div class="row justify-content-center">
  <div class="col-md-6">
    <h2 class="mb-4">Edit Profile</h2>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        <div class="mb-3">
          <label class="form-label">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <div class="text-danger small mt-1">{{ field.errors }}</div>
          {% endif %}
        </div>
      {% endfor %}
      <div class="d-flex gap-3">
        <button type="submit" class="btn btn-dark">Save Changes</button>
        <a href="{% url 'accounts:profile' username=user.username %}" class="btn btn-outline-dark">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
