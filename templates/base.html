<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}Wanderlust{% endblock %}</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="/">Wanderlust</a>
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="/">Home</a>
                    <a class="nav-link" href="/posts/">All Stories</a>
                    {% if user.is_authenticated %}
                    <a
                        class="nav-link"
                        href="{% url 'accounts:profile' username=user.username %}"
                        >Profile</a
                    >
                    <form
                        method="post"
                        action="{% url 'logout' %}"
                        class="d-inline"
                    >
                        {% csrf_token %}
                        <button type="submit" class="nav-link btn btn-link">
                            Sign Out
                        </button>
                    </form>
                    {% else %}
                    <a class="nav-link" href="{% url 'login' %}">Sign In</a>
                    <a class="nav-link" href="{% url 'accounts:register' %}"
                        >Register</a
                    >
                    {% endif %}
                </div>
            </div>
        </nav>

        {% if messages %}
        <div class="container mt-3">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <main class="container my-4">{% block content %}{% endblock %}</main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
