{% extends 'base.html' %}

{% block title %}Email Sent — Wanderlust{% endblock %}

{% block content %}

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-header">
      <p class="auth-brand">✦ Wanderlust</p>
      <h1 class="auth-title">Check Your Email</h1>
      <p class="auth-subtitle">If an account exists with that email address, we've sent a password reset link. Check your inbox (and spam folder, just in case).</p>
    </div>

    <a href="{% url 'login' %}" class="auth-btn" style="display:block; text-align:center; text-decoration:none;">Back to Sign In</a>

  </div>
</div>

{% endblock %}
