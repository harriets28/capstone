{% extends 'base.html' %}

{% block title %}Reset Password — Wanderlust{% endblock %}

{% block content %}

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-header">
      <p class="auth-brand">✦ Wanderlust</p>
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-subtitle">Enter your email address and we'll send you a link to reset your password.</p>
    </div>

    <form method="post" novalidate>
      {% csrf_token %}

      <div class="auth-field">
        <label for="id_email" class="auth-label">Email Address</label>
        <input type="email" name="email" id="id_email" class="auth-input" placeholder="Your email address" required autofocus />
      </div>

      <button type="submit" class="auth-btn">Send Reset Link</button>
    </form>

    <p class="auth-switch">
      Remember your password? <a href="{% url 'login' %}">Sign in</a>
    </p>

  </div>
</div>

{% endblock %}
