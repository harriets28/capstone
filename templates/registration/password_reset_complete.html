{% extends 'base.html' %}

{% block title %}Password Reset — Wanderlust{% endblock %}

{% block content %}

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-header">
      <p class="auth-brand">✦ Wanderlust</p>
      <h1 class="auth-title">Password Reset</h1>
      <p class="auth-subtitle">Your password has been updated. You can now sign in with your new password.</p>
    </div>

    <a href="{% url 'login' %}" class="auth-btn" style="display:block; text-align:center; text-decoration:none;">Sign In</a>

  </div>
</div>

{% endblock %}
