{% extends 'base.html' %}

{% block title %}Sign In — Wanderlust{% endblock %}

{% block content %}

<div class="row justify-content-center">
  <div class="col-md-4">
    <h2 class="mb-4 mt-5" style="font-family: var(--font-display);">Welcome Back</h2>
    <form method="post">
      {% csrf_token %}
      {% if form.errors %}
        <div class="alert alert-danger">Invalid username or password.</div>
      {% endif %}
      <div class="mb-3">
        <label class="form-label" style="font-family: var(--font-ui);">Username</label>
        <input type="text" name="username" class="form-control" required autofocus />
      </div>
      <div class="mb-3">
        <label class="form-label" style="font-family: var(--font-ui);">Password</label>
        <input type="password" name="password" class="form-control" required />
      </div>
      <input type="hidden" name="next" value="{{ next }}" />
      <button type="submit" class="btn-primary w-100">Sign In</button>
    </form>
    <p class="mt-3 text-center" style="font-family: var(--font-ui);">
      No account? <a href="{% url 'accounts:register' %}" style="color: var(--terra);">Register</a>
    </p>
  </div>
</div>

{% endblock %}
